<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="producto.css">
    <title>Document</title>
</head>

<body>
    <header class="lvp-header">
        <div class="lvp-header__container">

            <a href="/" class="lvp-header__logo" aria-label="Ir al inicio">
                <img src="../assets/logo.png" alt="Llama Violeta">
            </a>

        </div>
    </header>


    <main class="lvp-product">

        <section class="lvp-hero">
            <div class="lvp-hero__container">

                <!-- Foto principal -->
                <div class="lvp-hero__media">
                    <img src="" alt="">
                </div>

                <!-- Info producto -->
                <div class="lvp-hero__content">
                    <h1 class="lvp-hero__title"></h1>
                    <p class="lvp-hero__subtitle"></p>

                    <section class="lvp-info">
                        <div class="lvp-info__container">

                            <div class="lvp-info__block">
                                <h2>Descripción</h2>
                                <p></p>
                            </div>

                            <div class="lvp-info__block">
                                <h2>Precio</h2>
                                <p></p>
                            </div>

                            <!-- CTA debajo del precio -->
                            <div class="lvp-info__cta">
                                <a href="https://wa.me/549XXXXXXXXXX" target="_blank" class="lvp-cta__button">
                                    Consultar por WhatsApp
                                </a>
                            </div>

                        </div>
                    </section>
                </div>

            </div>
        </section>

        <!-- INFORMACIÓN -->
        <section class="lvp-info">
            <div class="lvp-info__container">

                <div class="lvp-info__block">
                    <h2>Descripción</h2>
                    <p></p>
                </div>

                <div class="lvp-info__block">
                    <h2>Precio</h2>
                    <p></p>
                </div>

            </div>
        </section>

        <!-- GALERÍA -->
        <section class="lvp-gallery">
            <div class="lvp-gallery__container">
                <div class="lvp-gallery__grid"></div>
            </div>
        </section>

    </main>


    <footer class="lvp-footer">
        <div class="lvp-footer__container">

            <div class="lvp-footer__brand">
                <span class="lvp-footer__name">Llama Violeta</span>
                <button class="lvp-footer__contact" type="button">
                    Consultas y pedidos
                </button>
            </div>

            <div class="lvp-footer__meta">
                <span>© Llama Violeta</span>
                <span class="lvp-footer__divider">·</span>
                <a href="https://www.initiumq.com" target="_blank" rel="noopener noreferrer"
                    class="lvp-footer__signature">
                    Desarrollado por InitiumQuest
                </a>
            </div>

        </div>
    </footer>

    <script src="../js/productos.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {

            const id = parseInt(localStorage.getItem("selectedProductId"), 10);
            const product = products.find(p => p.id === id);

            if (!product) return;

            /* HERO */
            document.querySelector(".lvp-hero__title").textContent = product.name;
            document.querySelector(".lvp-hero__subtitle").textContent = product.subtitle || "";
            document.querySelector(".lvp-hero__media img").src = product.images?.[0] || "";

            /* GALERÍA */
            const gallery = document.querySelector(".lvp-gallery__grid");
            gallery.innerHTML = "";

            product.images.forEach(img => {
                const el = document.createElement("img");
                el.src = img;
                el.alt = product.name;
                gallery.appendChild(el);
            });

            /* INFO BLOQUES → SOLO DESCRIPCIÓN Y PRECIO */
            const blocks = document.querySelectorAll(".lvp-info__block");

            // Descripción
            if (blocks[0]) {
                blocks[0].querySelector("p").textContent = product.descripcion || "";
            }

            // Precio
            if (blocks[1]) {
                blocks[1].querySelector("p").textContent = `$${product.precio}`;
            }

            // Ocultamos los bloques que ya no se usan
            if (blocks[2]) blocks[2].style.display = "none";
            if (blocks[3]) blocks[3].style.display = "none";

        });
    </script>


</body>

</html>
